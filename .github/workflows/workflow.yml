name: Node.js Check

on:
  push:
    branches:
      - main

jobs:
  node-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Node.js version
        run: node -v
